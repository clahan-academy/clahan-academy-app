# .github/workflows/build.yml

name: CI - Build and Security Scan

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  ACR_REGISTRY: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'acrclahan65bf2554.azurecr.io' || 'acrclahan65bf2554dev.azurecr.io' }}
  KV_NAME: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'kv-clahan-prod' || 'kv-clahan-65bf2554' }}
  ACR_NAME: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'acrclahan65bf2554' || 'acrclahan65bf2554dev' }}

jobs:
  lint-and-test:
    name: Lint and Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: frontend-service
            directory: frontend-service
            language: node
          - service: auth-service
            directory: auth-service
            language: node
          - service: admin-service
            directory: admin-service
            language: node
          - service: student-service
            directory: student-service
            language: node
          - service: exam-service
            directory: exam-service
            language: node
          - service: proctoring-service
            directory: proctoring-service
            language: node
          - service: notification-service
            directory: notification-service
            language: node
          - service: ai-service
            directory: ai-service
            language: python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Node)
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: npm ci --legacy-peer-deps

      - name: Install dependencies (Python)
        if: matrix.language == 'python'
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run ESLint
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Run Tests
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No test script found, skipping"
          fi

      - name: Azure OIDC Login
        if: failure()
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notification
        if: failure()
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv)
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv)
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv)
          echo "SMTP_USER=$USER" >> $GITHUB_ENV
          echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
          echo "SMTP_FROM=$FROM" >> $GITHUB_ENV

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - Lint/Test (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            Lint or Test failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  sonarcloud:
    name: SonarCloud Analysis - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - service: frontend-service
            directory: frontend-service
          - service: auth-service
            directory: auth-service
          - service: admin-service
            directory: admin-service
          - service: student-service
            directory: student-service
          - service: exam-service
            directory: exam-service
          - service: proctoring-service
            directory: proctoring-service
          - service: notification-service
            directory: notification-service
          - service: ai-service
            directory: ai-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SonarCloud token from Key Vault
        run: |
          TOKEN=$(az keyvault secret show \
            --vault-name ${{ env.KV_NAME }} \
            --name sonar-token \
            --query value -o tsv)
          echo "::add-mask::$TOKEN"
          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ matrix.directory }}
          args: >
            -Dsonar.projectKey=clahan-academy-${{ matrix.service }}
            -Dsonar.organization=clahan-academy
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/venv/**,**/*.test.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Fetch SMTP details for notification
        if: failure()
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv)
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv)
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv)
          echo "SMTP_USER=$USER" >> $GITHUB_ENV
          echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
          echo "SMTP_FROM=$FROM" >> $GITHUB_ENV

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - SonarCloud (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            SonarCloud scan failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  snyk-scan:
    name: Snyk Dependency Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - service: frontend-service
            directory: frontend-service
            language: node
          - service: auth-service
            directory: auth-service
            language: node
          - service: admin-service
            directory: admin-service
            language: node
          - service: student-service
            directory: student-service
            language: node
          - service: exam-service
            directory: exam-service
            language: node
          - service: proctoring-service
            directory: proctoring-service
            language: node
          - service: notification-service
            directory: notification-service
            language: node
          - service: ai-service
            directory: ai-service
            language: python
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Snyk token from Key Vault
        run: |
          TOKEN=$(az keyvault secret show \
            --vault-name ${{ env.KV_NAME }} \
            --name snyk-token \
            --query value -o tsv)
          echo "::add-mask::$TOKEN"
          echo "SNYK_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Setup Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Node)
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install dependencies (Python)
        if: matrix.language == 'python'
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Run Snyk Scan (Node)
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: |
          snyk test \
            --severity-threshold=high \
            --file=package.json \
            --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Run Snyk Scan (Python)
        if: matrix.language == 'python'
        working-directory: ${{ matrix.directory }}
        run: |
          snyk test \
            --severity-threshold=high \
            --file=requirements.txt \
            --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Convert Snyk Report to HTML
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f snyk-report.json ]; then
            snyk-to-html -i snyk-report.json -o snyk-report.html
          fi

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ matrix.service }}
          path: |
            ${{ matrix.directory }}/snyk-report.html
            ${{ matrix.directory }}/snyk-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Fetch SMTP details for notification
        if: failure()
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv)
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv)
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv)
          echo "SMTP_USER=$USER" >> $GITHUB_ENV
          echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
          echo "SMTP_FROM=$FROM" >> $GITHUB_ENV

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - Snyk (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            Snyk scan failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  trivy-scan:
    name: Trivy Container Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - service: frontend-service
            directory: frontend-service
          - service: auth-service
            directory: auth-service
          - service: admin-service
            directory: admin-service
          - service: student-service
            directory: student-service
          - service: exam-service
            directory: exam-service
          - service: proctoring-service
            directory: proctoring-service
          - service: notification-service
            directory: notification-service
          - service: ai-service
            directory: ai-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build \
            -t ${{ matrix.service }}:scan \
            ./${{ matrix.directory }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Azure OIDC Login
        if: failure()
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notification
        if: failure()
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv)
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv)
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv)
          echo "SMTP_USER=$USER" >> $GITHUB_ENV
          echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
          echo "SMTP_FROM=$FROM" >> $GITHUB_ENV

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - Trivy (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            Trivy container scan failed for: ${{ matrix.service }}
            High or Critical OS vulnerabilities found. Merge is blocked.

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  scan-summary:
    name: PR Scan Summary
    runs-on: ubuntu-latest
    needs: [sonarcloud, snyk-scan, trivy-scan]
    if: always()
    steps:
      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const sonar = '${{ needs.sonarcloud.result }}';
            const snyk = '${{ needs.snyk-scan.result }}';
            const trivy = '${{ needs.trivy-scan.result }}';
            const status = (r) => r === 'success' ? 'PASSED' : 'FAILED';
            const allPassed = sonar === 'success' && snyk === 'success' && trivy === 'success';
            const body = [
              '## Clahan Academy CI Scan Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| SonarCloud Code Quality | ${status(sonar)} |`,
              `| Snyk Dependencies | ${status(snyk)} |`,
              `| Trivy Container Scan (OS only) | ${status(trivy)} |`,
              '',
              allPassed
                ? 'All checks passed. Safe to merge.'
                : 'One or more checks failed. Fix issues before merging.'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
