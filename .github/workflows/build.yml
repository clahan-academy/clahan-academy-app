# .github/workflows/build.yml

name: Build

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to scan/test (all/frontend-service/auth-service/admin-service/student-service/exam-service/proctoring-service/notification-service/ai-service)"
        required: false
        default: "all"

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

env:
  ACR_REGISTRY: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'acrclahan65bf2554.azurecr.io' || 'acrclahan65bf2554dev.azurecr.io' }}
  KV_NAME: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'kv-clahan-prod' || 'kv-clahan-65bf2554' }}
  ACR_NAME: ${{ (github.ref_name == 'main' || github.base_ref == 'main') && 'acrclahan65bf2554' || 'acrclahan65bf2554dev' }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

jobs:
  detect-changes:
    name: "🔍 Detect Changed Services"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        run: |
          ALL_SERVICES='[
            {"service":"frontend-service","directory":"frontend-service","language":"node","image_name":"clahan-frontend"},
            {"service":"auth-service","directory":"auth-service","language":"node","image_name":"clahan-auth"},
            {"service":"admin-service","directory":"admin-service","language":"node","image_name":"clahan-admin"},
            {"service":"student-service","directory":"student-service","language":"node","image_name":"clahan-student"},
            {"service":"exam-service","directory":"exam-service","language":"node","image_name":"clahan-exam"},
            {"service":"proctoring-service","directory":"proctoring-service","language":"node","image_name":"clahan-proctoring"},
            {"service":"notification-service","directory":"notification-service","language":"node","image_name":"clahan-notification"},
            {"service":"ai-service","directory":"ai-service","language":"python","image_name":"clahan-ai"}
          ]'

          # Manual trigger workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.service }}"
            if [ "$INPUT" == "all" ] || [ -z "$INPUT" ]; then
              MATRIX=$(echo $ALL_SERVICES | jq -c '{"include": .}')
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "✅ Manual trigger: all services"
              exit 0
            else
              ENTRY=$(echo $ALL_SERVICES | jq -c \
                --arg svc "$INPUT" \
                '[.[] | select(.service == $svc)]')
              if [ "$(echo $ENTRY | jq length)" == "0" ]; then
                echo "❌ Service '$INPUT' not found"
                echo "has_changes=false" >> $GITHUB_OUTPUT
                exit 1
              fi
              MATRIX=$(echo $ENTRY | jq -c '{"include": .}')
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "✅ Manual trigger: $INPUT only"
              exit 0
            fi
          fi

          # Auto detect from git diff (PR vs Push)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Determine which services have changes or if the workflows changed
          CHANGED_SERVICES=()
          for SVC in frontend-service auth-service admin-service student-service exam-service proctoring-service notification-service ai-service; do
            DIR=$(echo $ALL_SERVICES | jq -r --arg s "$SVC" '.[] | select(.service==$s) | .directory')
            LANG=$(echo $ALL_SERVICES | jq -r --arg s "$SVC" '.[] | select(.service==$s) | .language')
            IMG=$(echo $ALL_SERVICES | jq -r --arg s "$SVC" '.[] | select(.service==$s) | .image_name')

            if echo "$CHANGED" | grep -q "^${DIR}/" || echo "$CHANGED" | grep -q "^\.github/workflows/"; then
              CHANGED_SERVICES+=("{\"service\":\"${SVC}\",\"directory\":\"${DIR}\",\"language\":\"${LANG}\",\"image_name\":\"${IMG}\"}")
              echo "✅ Service changed: $SVC"
            fi
          done

          if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
            echo "ℹ️ No service changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(printf '%s,' "${CHANGED_SERVICES[@]}" | sed 's/,$//')
            MATRIX="{\"include\":[$JSON_ARRAY]}"
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ ${#CHANGED_SERVICES[@]} service(s) changed"
          fi

  lint-and-test:
    name: Lint and Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Node)
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: npm ci --legacy-peer-deps

      - name: Install dependencies (Python)
        if: matrix.language == 'python'
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run ESLint
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f node_modules/.bin/eslint ]; then
            npm run lint
          else
            echo "eslint executable not found in node_modules, skipping lint"
          fi

      - name: Run Tests
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: |
          if npm run | grep -q "test"; then
            npm test
          else
            echo "No test script found, skipping"
          fi

      - name: Azure OIDC Login
        if: failure() && env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notification
        if: failure() && env.AZURE_CLIENT_ID != ''
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Email on Failure
        if: failure() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - Lint/Test (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            Lint or Test failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  sonarcloud:
    name: SonarCloud Analysis - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure OIDC Login
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SonarCloud token from Key Vault
        if: env.AZURE_CLIENT_ID != ''
        run: |
          TOKEN=$(az keyvault secret show \
            --vault-name ${{ env.KV_NAME }} \
            --name sonar-token \
            --query value -o tsv || echo "")
          if [ -n "$TOKEN" ]; then
            echo "::add-mask::$TOKEN"
            echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
          fi

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: ${{ matrix.directory }}
          args: >
            -Dsonar.projectKey=clahan-academy-${{ matrix.service }}
            -Dsonar.organization=clahan-academy
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/venv/**,**/*.test.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Fetch SMTP details for notification
        if: failure() && env.AZURE_CLIENT_ID != ''
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Email on Failure
        if: failure() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - SonarCloud (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            SonarCloud scan failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  snyk-scan:
    name: Snyk Dependency Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Snyk token from Key Vault
        if: env.AZURE_CLIENT_ID != ''
        run: |
          TOKEN=$(az keyvault secret show \
            --vault-name ${{ env.KV_NAME }} \
            --name snyk-token \
            --query value -o tsv || echo "")
          if [ -n "$TOKEN" ]; then
            echo "::add-mask::$TOKEN"
            echo "SNYK_TOKEN=$TOKEN" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (Node)
        if: matrix.language == 'node'
        working-directory: ${{ matrix.directory }}
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install dependencies (Python)
        if: matrix.language == 'python'
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Run Snyk Scan (Node)
        if: matrix.language == 'node' && env.SNYK_TOKEN != ''
        working-directory: ${{ matrix.directory }}
        run: |
          snyk test \
            --severity-threshold=high \
            --file=package.json \
            --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Run Snyk Scan (Python)
        if: matrix.language == 'python' && env.SNYK_TOKEN != ''
        working-directory: ${{ matrix.directory }}
        run: |
          snyk test \
            --severity-threshold=high \
            --file=requirements.txt \
            --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}

      - name: Convert Snyk Report to HTML
        if: env.SNYK_TOKEN != ''
        working-directory: ${{ matrix.directory }}
        run: |
          if [ -f snyk-report.json ]; then
            snyk-to-html -i snyk-report.json -o snyk-report.html
          fi

      - name: Upload Snyk Report
        if: always() && env.SNYK_TOKEN != ''
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ matrix.service }}
          path: |
            ${{ matrix.directory }}/snyk-report.html
            ${{ matrix.directory }}/snyk-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Fetch SMTP details for notification
        if: failure() && env.AZURE_CLIENT_ID != ''
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Email on Failure
        if: failure() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - Snyk (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            Snyk scan failed for: ${{ matrix.service }}

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  trivy-scan:
    name: Trivy Container Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build \
            -t ${{ matrix.service }}:scan \
            ./${{ matrix.directory }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Azure OIDC Login
        if: failure() && env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notification
        if: failure() && env.AZURE_CLIENT_ID != ''
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Email on Failure
        if: failure() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CI Failed - Trivy (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CI Pipeline
          body: |
            Trivy container scan failed for: ${{ matrix.service }}
            High or Critical OS vulnerabilities found. Merge is blocked.

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}
            PR     : ${{ github.event.pull_request.html_url }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  scan-summary:
    name: PR Scan Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, sonarcloud, snyk-scan, trivy-scan]
    if: always() && needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const sonar = '${{ needs.sonarcloud.result }}';
            const snyk = '${{ needs.snyk-scan.result }}';
            const trivy = '${{ needs.trivy-scan.result }}';
            const status = (r) => r === 'success' ? 'PASSED' : (r === 'skipped' ? 'SKIPPED' : 'FAILED');
            const allPassed = (sonar === 'success' || sonar === 'skipped') &&
                              (snyk === 'success' || snyk === 'skipped') &&
                              (trivy === 'success' || trivy === 'skipped');
            const body = [
              '## Clahan Academy CI Scan Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| SonarCloud Code Quality | ${status(sonar)} |`,
              `| Snyk Dependencies | ${status(snyk)} |`,
              `| Trivy Container Scan (OS only) | ${status(trivy)} |`,
              '',
              allPassed
                ? 'All checks passed. Safe to merge.'
                : 'One or more checks failed. Fix issues before merging.'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
