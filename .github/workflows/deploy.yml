# .github/workflows/deploy.yml

name: "CD — Deploy via ArgoCD"

on:
  workflow_run:
    workflows: ["CI — Build, Scan & Push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  KV_NAME: ${{ github.ref_name == 'main' && 'kv-clahan-prod' || 'kv-clahan-65bf2554' }}
  AZURE_RESOURCE_GROUP: ${{ github.ref_name == 'main' && 'rg-clahan-prod' || 'rg-clahan-dev' }}

jobs:
  deploy:
    name: "Deploy to AKS"
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    environment: ${{ github.ref_name == 'main' && 'production' || 'infrastructure' }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notifications
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv)
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv)
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv)
          echo "SMTP_USER=$USER" >> $GITHUB_ENV
          echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
          echo "SMTP_FROM=$FROM" >> $GITHUB_ENV

      - name: Send Deployment Started Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy - Deployment Started"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            A new deployment has been triggered and is initiating for clahaanacademy.online.

            Triggered By : ${{ github.actor }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name aks-clahan-academy \
            --overwrite-existing

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Check ArgoCD sync status
        run: |
          az aks command invoke \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name aks-clahan-academy \
            --command "kubectl get application clahan-academy -n argocd"

      - name: Trigger ArgoCD sync
        run: |
          az aks command invoke \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name aks-clahan-academy \
            --command "kubectl annotate application clahan-academy \
              -n argocd \
              argocd.argoproj.io/refresh=hard \
              --overwrite"

      - name: Wait for rollout
        run: |
          az aks command invoke \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name aks-clahan-academy \
            --command "kubectl rollout status deployment/clahan-frontend \
              -n clahan-academy \
              --timeout=300s"

      - name: Run smoke tests
        run: |
          sleep 30
          
          ENDPOINTS=(
            "https://clahaanacademy.online/api/auth/health"
            "https://clahaanacademy.online/api/exams/health"
            "https://clahaanacademy.online/api/student/health"
          )
          
          for endpoint in "${ENDPOINTS[@]}"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 "$endpoint" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ $endpoint → $HTTP_CODE"
            else
              echo "⚠️  $endpoint → $HTTP_CODE (non-critical)"
            fi
          done

      - name: Send Deployment Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CD Success - Production Deployed"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            The production deployment for clahaanacademy.online completed successfully!

            Triggered By : ${{ github.actor }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}

            Application URL: https://clahaanacademy.online
            Namespace: clahan-academy

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Deployment Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CD Failed - Deployment Failed"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            The production deployment for clahaanacademy.online has FAILED.

            Triggered By : ${{ github.actor }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
