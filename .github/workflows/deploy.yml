# .github/workflows/deploy.yml

name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all/frontend-service/auth-service/admin-service/student-service/exam-service/proctoring-service/notification-service/ai-service)"
        required: false
        default: "all"

permissions:
  id-token: write
  contents: write

env:
  ACR_REGISTRY: acrclahan65bf2554.azurecr.io
  ACR_NAME: acrclahan65bf2554
  KV_NAME: kv-clahan-prod
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

jobs:
  detect-changes:
    name: "🔍 Detect Changed Services"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        run: |
          ALL_SERVICES='[
            {"service":"frontend-service","directory":"frontend-service","language":"node","image_name":"clahan-frontend"},
            {"service":"auth-service","directory":"auth-service","language":"node","image_name":"clahan-auth"},
            {"service":"admin-service","directory":"admin-service","language":"node","image_name":"clahan-admin"},
            {"service":"student-service","directory":"student-service","language":"node","image_name":"clahan-student"},
            {"service":"exam-service","directory":"exam-service","language":"node","image_name":"clahan-exam"},
            {"service":"proctoring-service","directory":"proctoring-service","language":"node","image_name":"clahan-proctoring"},
            {"service":"notification-service","directory":"notification-service","language":"node","image_name":"clahan-notification"},
            {"service":"ai-service","directory":"ai-service","language":"python","image_name":"clahan-ai"}
          ]'

          # Manual trigger workflow_dispatch
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.service }}"
            if [ "$INPUT" == "all" ] || [ -z "$INPUT" ]; then
              MATRIX=$(echo $ALL_SERVICES | jq -c '{"include": .}')
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "✅ Manual trigger: all services"
              exit 0
            else
              ENTRY=$(echo $ALL_SERVICES | jq -c \
                --arg svc "$INPUT" \
                '[.[] | select(.service == $svc)]')
              if [ "$(echo $ENTRY | jq length)" == "0" ]; then
                echo "❌ Service '$INPUT' not found"
                echo "has_changes=false" >> $GITHUB_OUTPUT
                exit 1
              fi
              MATRIX=$(echo $ENTRY | jq -c '{"include": .}')
              echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "✅ Manual trigger: $INPUT only"
              exit 0
            fi
          fi

          # Auto detect from git diff (on push to main)
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

          echo "Changed files:"
          echo "$CHANGED"

          # Determine which services have changes or if the workflows changed
          CHANGED_SERVICES=()
          for SVC in frontend-service auth-service admin-service student-service exam-service proctoring-service notification-service ai-service; do
            DIR=$(echo $ALL_SERVICES | jq -r --arg s "$SVC" '.[] | select(.service==$s) | .directory')
            LANG=$(echo $ALL_SERVICES | jq -r --arg s "$SVC" '.[] | select(.service==$s) | .language')
            IMG=$(echo $ALL_SERVICES | jq -r --arg s "$SVC" '.[] | select(.service==$s) | .image_name')

            if echo "$CHANGED" | grep -q "^${DIR}/" || echo "$CHANGED" | grep -q "^\.github/workflows/"; then
              CHANGED_SERVICES+=("{\"service\":\"${SVC}\",\"directory\":\"${DIR}\",\"language\":\"${LANG}\",\"image_name\":\"${IMG}\"}")
              echo "✅ Service changed: $SVC"
            fi
          done

          if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
            echo "ℹ️ No service changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
          else
            JSON_ARRAY=$(printf '%s,' "${CHANGED_SERVICES[@]}" | sed 's/,$//')
            MATRIX="{\"include\":[$JSON_ARRAY]}"
            echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ ${#CHANGED_SERVICES[@]} service(s) changed"
          fi

  generate-version:
    name: Generate Semantic Version
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    outputs:
      semantic_tag: ${{ steps.semver.outputs.new_tag }}
      sha_tag: ${{ steps.sha.outputs.sha_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SHA tag
        id: sha
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha_tag=prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "SHA tag: prod-${SHORT_SHA}"

      - name: Generate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "v"
          default_bump: patch
          initial_version: "1.0.0"
          custom_release_rules: "feat:minor:Features,fix:patch:Fixes,breaking:major:Breaking Changes"
          dry_run: false

      - name: Print tags
        run: |
          echo "Semantic tag: ${{ steps.semver.outputs.new_tag }}"
          echo "SHA tag: ${{ steps.sha.outputs.sha_tag }}"

  build-and-push:
    name: Build and Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [detect-changes, generate-version]
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: env.AZURE_CLIENT_ID != ''
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker image
        run: |
          SEMANTIC_TAG="${{ needs.generate-version.outputs.semantic_tag }}"
          SHA_TAG="${{ needs.generate-version.outputs.sha_tag }}"
          ACR_IMAGE="${{ env.ACR_REGISTRY }}/${{ matrix.image_name }}"

          docker build \
            --platform linux/amd64 \
            -t ${ACR_IMAGE}:${SEMANTIC_TAG} \
            -t ${ACR_IMAGE}:${SHA_TAG} \
            -t ${ACR_IMAGE}:latest \
            ./${{ matrix.service }}

          echo "Built image with tags:"
          echo "  ${ACR_IMAGE}:${SEMANTIC_TAG}"
          echo "  ${ACR_IMAGE}:${SHA_TAG}"
          echo "  ${ACR_IMAGE}:latest"

      - name: Run Trivy scan before push
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ACR_REGISTRY }}/${{ matrix.image_name }}:${{ needs.generate-version.outputs.semantic_tag }}"
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          vuln-type: os
          ignore-unfixed: true

      - name: Push all tags to ACR
        if: env.AZURE_CLIENT_ID != ''
        run: |
          SEMANTIC_TAG="${{ needs.generate-version.outputs.semantic_tag }}"
          SHA_TAG="${{ needs.generate-version.outputs.sha_tag }}"
          ACR_IMAGE="${{ env.ACR_REGISTRY }}/${{ matrix.image_name }}"

          docker push ${ACR_IMAGE}:${SEMANTIC_TAG}
          docker push ${ACR_IMAGE}:${SHA_TAG}
          docker push ${ACR_IMAGE}:latest

          echo "Pushed all tags successfully"

      - name: Fetch SMTP details for notification
        if: failure() && env.AZURE_CLIENT_ID != ''
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Email on Failure
        if: failure() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CD Failed - Build/Push (${{ matrix.service }})"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            Docker build or push FAILED for: ${{ matrix.service }}

            Semantic Tag : ${{ needs.generate-version.outputs.semantic_tag }}
            SHA Tag      : ${{ needs.generate-version.outputs.sha_tag }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}
            Author       : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  approval-gate:
    name: Approval Gate - Production
    runs-on: ubuntu-latest
    needs: [detect-changes, generate-version, build-and-push]
    if: needs.detect-changes.outputs.has_changes == 'true'
    environment: production
    steps:
      - name: Azure OIDC Login
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notification
        if: env.AZURE_CLIENT_ID != ''
        continue-on-error: true
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Approval Request Email
        if: env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy - Approval Needed for Production Deployment"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            A new build is waiting for your approval to deploy to production.

            Semantic Tag : ${{ needs.generate-version.outputs.semantic_tag }}
            SHA Tag      : ${{ needs.generate-version.outputs.sha_tag }}
            Triggered By : ${{ github.actor }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}

            TO APPROVE:
            1. Open: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            2. Click "Review deployments"
            3. Select "production"
            4. Click "Approve and deploy"

            TO REJECT:
            Same link, click "Reject"

      - name: Log approval
        run: |
          echo "Deployment approved"
          echo "Semantic tag : ${{ needs.generate-version.outputs.semantic_tag }}"
          echo "SHA tag      : ${{ needs.generate-version.outputs.sha_tag }}"
          echo "Approved by  : ${{ github.actor }}"
          echo "Time         : $(date -u)"

  update-helm:
    name: Update Helm Manifests
    runs-on: ubuntu-latest
    needs: [detect-changes, generate-version, build-and-push, approval-gate]
    if: needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - name: Checkout helm repo
        uses: actions/checkout@v4
        with:
          repository: clahan-academy/clahan-academy-helm
          token: ${{ secrets.MANIFEST_REPO_PAT || secrets.GITHUB_TOKEN }}
          path: clahan-academy-helm

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Update image tags in values.yaml
        run: |
          SEMANTIC_TAG="${{ needs.generate-version.outputs.semantic_tag }}"
          SHA_TAG="${{ needs.generate-version.outputs.sha_tag }}"
          cd clahan-academy-helm

          echo "Updating values.yaml"
          echo "Semantic tag: ${SEMANTIC_TAG}"
          echo "SHA tag     : ${SHA_TAG}"

          VALUES="clahan-academy/values.yaml"

          # Loop through only the changed services and update their tags dynamically
          SERVICES=$(echo '${{ needs.detect-changes.outputs.matrix }}' | jq -c '.include[]')
          for SVC_ENTRY in $SERVICES; do
            HELM_KEY=$(echo $SVC_ENTRY | jq -r '.service' | sed 's/-service//')
            yq -i ".${HELM_KEY}.image.tag = \"${SEMANTIC_TAG}\"" ${VALUES}
            echo "✅ Updated ${HELM_KEY} to ${SEMANTIC_TAG}"
          done

          echo "Updated values.yaml:"
          cat ${VALUES}

      - name: Commit and push to helm repo
        run: |
          cd clahan-academy-helm
          git config user.name "Clahan Academy CI"
          git config user.email "ci@clahanacademy.online"

          git add clahan-academy/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit - tags already up to date"
            exit 0
          fi

          SEMANTIC_TAG="${{ needs.generate-version.outputs.semantic_tag }}"
          SHA_TAG="${{ needs.generate-version.outputs.sha_tag }}"
          git commit -m "cd(production): deploy ${SEMANTIC_TAG} (${SHA_TAG}) [skip ci]"

          for i in 1 2 3 4 5; do
            git push && break
            echo "Push failed, retry $i/5"
            git pull --rebase origin main
            sleep $((i * 2))
          done

      - name: Azure OIDC Login
        if: always() && env.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        continue-on-error: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SMTP details for notification
        if: always() && env.AZURE_CLIENT_ID != ''
        continue-on-error: true
        run: |
          USER=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-user --query value -o tsv || echo "")
          PASS=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-pass --query value -o tsv || echo "")
          FROM=$(az keyvault secret show --vault-name ${{ env.KV_NAME }} --name smtp-from --query value -o tsv || echo "")
          if [ -n "$USER" ] && [ -n "$FROM" ]; then
            echo "SMTP_USER=$USER" >> $GITHUB_ENV
            echo "SMTP_PASS=$PASS" >> $GITHUB_ENV
            echo "SMTP_FROM=$FROM" >> $GITHUB_ENV
          fi

      - name: Send Success Email
        if: success() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CD Success - Production Deployed"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            Production deployment completed successfully.

            Semantic Tag : ${{ needs.generate-version.outputs.semantic_tag }}
            SHA Tag      : ${{ needs.generate-version.outputs.sha_tag }}
            Triggered By : ${{ github.actor }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}

            ArgoCD will sync to production namespace within 3 minutes.

            Helm repo: https://github.com/clahan-academy/clahan-academy-helm

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Failure Email
        if: failure() && env.SMTP_USER != '' && env.SMTP_FROM != ''
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: "Clahan Academy CD Failed - Helm Update Failed"
          to: ${{ env.SMTP_FROM }}
          from: Clahan Academy CD Pipeline
          body: |
            GitOps manifest update FAILED.

            Semantic Tag : ${{ needs.generate-version.outputs.semantic_tag }}
            SHA Tag      : ${{ needs.generate-version.outputs.sha_tag }}
            Triggered By : ${{ github.actor }}
            Branch       : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
